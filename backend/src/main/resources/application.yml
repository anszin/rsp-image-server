spring:
  datasource:
    url: jdbc:h2:mem:foodmenu
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:uploads/,classpath:/static/

storage:
  local:
    root: uploads
  base-url: http://localhost:8080

server:
  port: 8080
