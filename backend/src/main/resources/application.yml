spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:aws-1-ap-southeast-2.pooler.supabase.com}:${DB_PORT:5432}/${DB_NAME:postgres}?prepareThreshold=0
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres.fhaiwezswxullchwmyal}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:uploads/,classpath:/static/

storage:
  local:
    root: uploads
  base-url: http://localhost:8080

server:
  port: 8081
